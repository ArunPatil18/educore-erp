<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCore ERP — Faculty Schedule</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .tt-container { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); overflow: hidden; margin-top: 24px; }
    .tt-header { padding: 24px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to right, rgba(139,92,246,0.05), transparent); }
    .tt-grid-wrapper { overflow-x: auto; padding: 20px; }
    .tt-table { width: 100%; border-collapse: separate; border-spacing: 8px; min-width: 900px; }
    .tt-table th { padding: 16px; text-align: center; background: rgba(255,255,255,0.03); border-radius: var(--radius-md); font-size: 13px; color: var(--text-secondary); font-weight: 600; border: 1px solid var(--glass-border); }
    .tt-table td { padding: 12px; text-align: center; background: var(--bg-document); border: 1px solid var(--glass-border); border-radius: var(--radius-md); transition: var(--transition); height: 110px; vertical-align: top; }
    .tt-day-col { background: rgba(139,92,246,0.1) !important; color: var(--accent); font-weight: 700; width: 120px; display: flex; align-items: center; justify-content: center; height: 100%; font-size: 15px; }
    .slot-class { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .slot-sub { font-size: 11px; color: var(--primary-light); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .slot-loc { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; }
    .empty-slot { color: var(--text-muted); font-size: 12px; font-style: italic; display: flex; align-items: center; justify-content: center; height: 100%; opacity: 0.4; }
    .pulse-live { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">My Teaching Schedule</h1>
        <div class="page-subtitle" id="tt-subtitle">Weekly overview of your assigned classes</div>
      </div>
      
      <div id="tt-content">
        <div style="display:flex;align-items:center;justify-content:center;height:40vh;"><div class="spinner" style="display:block;width:36px;height:36px;border-width:3px;"></div></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { requireAuth, getUserProfile } from '../js/auth.js';
    import { db } from '../js/firebase-config.js';
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    import { buildSidebar, safeAsync, getSubjectColor, getSubjectBorder } from '../js/utils.js';

    const NAV = [
      { label: 'Faculty', items: [
        { href: 'dashboard.html', icon: 'home', text: 'Dashboard' },
        { href: 'timetable.html', icon: 'calendar_today', text: 'My Schedule', active: true },
        { href: 'attendance.html', icon: 'calendar_month', text: 'Mark Attendance' },
        { href: 'marks.html', icon: 'grade', text: 'Enter Marks' },
        { href: 'materials.html', icon: 'library_books', text: 'Study Materials' },
      ]}
    ];

    async function init() {
      try {
        const { user } = await requireAuth(['faculty']);
        const profile = await safeAsync(() => getUserProfile(user.uid), null, null) || {};
        document.getElementById('sidebar').innerHTML = buildSidebar('Faculty', profile.name || user.email, NAV);
        document.getElementById('logout-btn').addEventListener('click', () => { window.location.href = '../index.html'; });
        
        loadFacultyTimetable(user.uid);
      } catch(e) { window.location.href = '../index.html'; }
    }

    async function loadFacultyTimetable(facultyId) {
      // 1. Fetch all manual timetables
      const snap = await safeAsync(() => getDocs(collection(db, 'manual_timetables')), null, null);
      if(!snap) { renderError("Failed to connect to database."); return; }

      const allTTs = snap.docs.map(d => d.data());
      
      // 2. Aggregate slots for this faculty
      const mySlots = [];
      allTTs.forEach(tt => {
         tt.slots.forEach(slot => {
            if(slot.facultyId === facultyId) {
               mySlots.push({
                  ...slot,
                  department: tt.department,
                  semester: tt.semester,
                  section: tt.section
               });
            }
         });
      });

      if(mySlots.length === 0) {
         renderError("You have not been assigned to any slots in the AI Timetable yet.");
         return;
      }

      renderGrid(mySlots);
    }

    function renderGrid(slots) {
      const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const TIMES = ['09:00 - 10:00', '10:00 - 11:00', '11:00 - 12:00', '12:00 - 01:00', '01:00 - 02:00', '02:00 - 03:00'];
      
      const now = new Date();
      const currentDay = now.toLocaleDateString('en-US', { weekday: 'long' });
      const currentH = now.getHours();
      const currentM = now.getMinutes();
      const currentTotalMin = currentH * 60 + currentM;

      let html = `
        <div class="tt-container">
          <div class="tt-header">
            <div>
               <div style="font-weight:700;font-size:16px;">Weekly Teaching Matrix</div>
               <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Consolidated view across all assigned sections</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;font-size:12px;background:rgba(139,92,246,0.1);color:var(--accent);padding:6px 14px;border-radius:var(--radius-full);border:1px solid rgba(139,92,246,0.2);">
               <span class="icon icon-sm pulse-live" style="font-size:14px;">sensors</span> Live Attendance Bridge Active
            </div>
          </div>
          <div class="tt-grid-wrapper">
            <table class="tt-table">
              <thead>
                <tr>
                  <th style="width:120px; background:transparent; border:none;"></th>
                  ${TIMES.map(t => `<th>${t}</th>`).join('')}
                </tr>
              </thead>
              <tbody>`;

      DAYS.forEach(day => {
        const isToday = day === currentDay;
        html += `<tr><td class="tt-day-col" style="${isToday ? 'background:var(--accent) !important; color:#fff;' : ''}">${day}</td>`;
        
        TIMES.forEach(time => {
          const entry = slots.find(s => s.day === day && s.time === time);
          
          // Robust live check
          const [startStr, endStr] = time.split(' - ');
          const getMinutes = (str) => {
             let [h, m] = str.split(':').map(Number);
             if (h >= 1 && h <= 8) h += 12; // PM adjustment
             return h * 60 + m;
          };
          const startMin = getMinutes(startStr);
          const endMin = getMinutes(endStr);
          const isLive = isToday && (currentTotalMin >= startMin && currentTotalMin < endMin);

          if(entry) {
            const bgColor = getSubjectColor(entry.subjectCode);
            const borderColor = getSubjectBorder(entry.subjectCode);
            html += `
              <td style="background:${bgColor}; border-color:${borderColor}; position:relative; ${isLive ? 'box-shadow: 0 0 0 2px var(--accent); z-index:2;' : ''}">
                ${isLive ? '<div style="position:absolute; top:6px; right:6px; font-size:8px; background:var(--accent); color:#fff; padding:1px 5px; border-radius:3px; font-weight:bold;">NOW</div>' : ''}
                <div class="slot-sub" style="color:${borderColor.replace('0.4','1')}">${entry.subjectCode}</div>
                <div class="slot-class">Sem ${entry.semester} - ${entry.section}</div>
                <div style="font-size:10px; color:var(--text-muted); line-height:1.2;">Dept: ${entry.department.split(' ')[0]}</div>
                <div class="slot-loc">Room 10${entry.semester}</div>
              </td>`;
          } else {
            html += `<td><div class="empty-slot">—</div></td>`;
          }
        });
        html += `</tr>`;
      });

      html += `</tbody></table></div></div>`;
      document.getElementById('tt-content').innerHTML = html;
    }

    function renderError(msg) {
      document.getElementById('tt-content').innerHTML = `
        <div class="card" style="text-align:center;padding:60px 40px;">
          <div style="margin-bottom:24px;"><span class="icon icon-2xl" style="color:var(--warning);font-size:64px;">info</span></div>
          <div style="font-size:16px;font-weight:600;color:var(--text-secondary);">${msg}</div>
        </div>`;
    }

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    init();
  </script>
</body>
</html>
