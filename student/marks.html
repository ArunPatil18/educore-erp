<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCore ERP — Marks</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .marks-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 22px; margin-bottom: 16px; transition: var(--transition); }
    .marks-card:hover { border-color: var(--glass-border-hover); }
    .marks-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .marks-subj { font-size: 15px; font-weight: 600; }
    .cie-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 12px; }
    .cie-box { background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 14px; text-align: center; }
    .cie-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .cie-val { font-family: var(--font-display); font-size: 26px; font-weight: 700; }
    .cie-max { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  </style>
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header"><h1 class="page-title">Marks &amp; Results</h1><div class="page-subtitle">Internal assessment marks and grades</div></div>
      <div id="error-zone"></div>
      <div id="content"><div style="display:flex;align-items:center;justify-content:center;height:40vh;"><div class="spinner" style="display:block;width:36px;height:36px;border-width:3px;"></div></div></div>
    </main>
  </div>
  <div id="toast-container"></div>
  <script type="module">
    import { requireAuth, logoutUser, getUserProfile } from '../js/auth.js';
    import { db } from '../js/firebase-config.js';
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    import { buildSidebar, safeAsync } from '../js/utils.js';
    const NAV = [
      { label: 'Main', items: [
        { href: 'dashboard.html', icon: 'home', text: 'Dashboard' },
        { href: 'attendance.html', icon: 'calendar_month', text: 'Attendance' },
        { href: 'marks.html', icon: 'grade', text: 'Marks & Results', active: true },
        { href: 'fees.html', icon: 'payments', text: 'Fees' },
      ]},
      { label: 'Resources', items: [
        { href: 'courses.html', icon: 'menu_book', text: 'My Courses' },
        { href: 'announcements.html', icon: 'campaign', text: 'Announcements' }
      ]}
    ];
    function getGrade(pct) {
      if (pct>=90) return {g:'O',c:'badge-success'}; if (pct>=80) return {g:'A+',c:'badge-success'};
      if (pct>=70) return {g:'A',c:'badge-info'}; if (pct>=60) return {g:'B+',c:'badge-info'};
      if (pct>=50) return {g:'B',c:'badge-warning'}; if (pct>=40) return {g:'C',c:'badge-warning'};
      return {g:'F',c:'badge-danger'};
    }
    async function init() {
      try {
        const { user } = await requireAuth(['student']);
        const profile = await safeAsync(() => getUserProfile(user.uid), null, null) || {};
        document.getElementById('sidebar').innerHTML = buildSidebar('Student', profile.name || user.email, NAV);
        document.getElementById('logout-btn').addEventListener('click', logoutUser);
        const data = await safeAsync(async () => { const q=query(collection(db,'marks'),where('studentId','==',user.uid)); const s=await getDocs(q); return s.docs.map(d=>({id:d.id,...d.data()})); }, 'error-zone', 'Failed to load marks') || [];
        if (!data.length) { document.getElementById('content').innerHTML = `<div class="card" style="text-align:center;padding:48px;color:var(--text-muted)">No marks records found yet.</div>`; return; }
        const avg = data.reduce((a,b)=>a+(b.total||0),0)/data.length;
        document.getElementById('content').innerHTML = `
          <div class="stats-grid" style="margin-bottom:28px;">
            <div class="stat-card purple"><div class="stat-icon purple"><span class="icon icon-filled icon-xl">grade</span></div><div class="stat-info"><div class="stat-value">${data.length}</div><div class="stat-label">Subjects</div></div></div>
            <div class="stat-card cyan"><div class="stat-icon cyan"><span class="icon icon-filled icon-xl">bar_chart</span></div><div class="stat-info"><div class="stat-value">${avg.toFixed(1)}</div><div class="stat-label">Average Total</div></div></div>
            <div class="stat-card green"><div class="stat-icon green"><span class="icon icon-filled icon-xl">emoji_events</span></div><div class="stat-info"><div class="stat-value">${getGrade(avg).g}</div><div class="stat-label">Overall Grade</div></div></div>
          </div>
          ${(() => {
            const bySem = {};
            data.forEach(s => {
              const sem = s.semester || 'Current';
              if (!bySem[sem]) bySem[sem] = [];
              bySem[sem].push(s);
            });
            const sortedSems = Object.keys(bySem).sort((a,b) => parseInt(a)||99 - (parseInt(b)||99));
            return sortedSems.map(sem => `
              <div style="font-size:16px;font-weight:700;margin:24px 0 16px;">Semester ${sem}</div>
              ${bySem[sem].map(s => {
                const max=(s.maxCie1||30)+(s.maxCie2||30)+(s.maxAssignment||20);
                const total=(s.cie1||0)+(s.cie2||0)+(s.assignment||0);
                const pct=max?Math.round(total/max*100):0;
                const {g,c}=getGrade(pct);
                return `<div class="marks-card">
                  <div class="marks-header">
                    <div><div class="marks-subj">${s.subjectName||s.subjectCode}</div><div style="font-size:12px;color:var(--text-muted)">${s.subjectCode}</div></div>
                    <span class="badge ${c}" style="font-size:18px;font-weight:800;padding:6px 16px;">${g}</span>
                  </div>
                  <div class="cie-row">
                    <div class="cie-box"><div class="cie-label">CIE 1</div><div class="cie-val" style="color:var(--primary-light)">${s.cie1??'—'}</div><div class="cie-max">/ ${s.maxCie1||30}</div></div>
                    <div class="cie-box"><div class="cie-label">CIE 2</div><div class="cie-val" style="color:var(--secondary)">${s.cie2??'—'}</div><div class="cie-max">/ ${s.maxCie2||30}</div></div>
                    <div class="cie-box"><div class="cie-label">Assignment</div><div class="cie-val" style="color:var(--accent)">${s.assignment??'—'}</div><div class="cie-max">/ ${s.maxAssignment||20}</div></div>
                    <div class="cie-box" style="border-color:rgba(37,99,235,.3);background:rgba(37,99,235,.06)"><div class="cie-label">Total</div><div class="cie-val" style="color:var(--primary-light)">${total}</div><div class="cie-max">/ ${max}</div></div>
                  </div>
                  <div style="margin-top:14px;"><div class="progress-bar-wrap"><div class="progress-bar-fill ${pct>=75?'green':pct>=50?'yellow':'red'}" style="width:${pct}%"></div></div><div style="font-size:12px;color:var(--text-muted);margin-top:6px;">${pct}% scored</div></div>
                </div>`;
              }).join('')}
            `).join('');
          })()}`;
      } catch(e) { window.location.href = '../index.html'; }
    }
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    init();
  </script>
</body>
</html>
