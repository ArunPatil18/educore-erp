<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCore ERP — My Profile</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .profile-hero { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: 48px; text-align: center; display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
    .profile-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--glass-border); box-shadow: 0 12px 32px rgba(0,0,0,0.5); margin-bottom: 20px; }
    .profile-name { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--text-primary); }
    .profile-email { font-size: 15px; color: var(--text-secondary); margin-top: 4px; }
    
    .profile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .p-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 24px; transition: var(--transition); display: flex; align-items: center; gap: 20px; }
    .p-card:hover { border-color: var(--primary); background: rgba(37,99,235,0.05); transform: translateY(-3px); }
    .p-icon { width: 56px; height: 56px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); flex-shrink: 0; }
    .p-card:hover .p-icon { background: var(--primary-light); color: #fff; box-shadow: 0 8px 25px rgba(37,99,235,0.4); }
    .p-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .p-value { font-size: 18px; font-weight: 700; color: var(--text-primary); font-family: var(--font-display); }
  </style>
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">My Profile</h1>
        <div class="page-subtitle">View your personal details and academic credentials</div>
      </div>
      
      <div id="content">
        <div style="display:flex;align-items:center;justify-content:center;height:40vh;">
          <div class="spinner" style="display:block;width:36px;height:36px;border-width:3px;"></div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast-container"></div>
  <script type="module">
    import { requireAuth, logoutUser, getUserProfile } from '../js/auth.js';
    import { buildSidebar, safeAsync } from '../js/utils.js';

    const NAV = [
      { label: 'Main', items: [
        { href: 'dashboard.html', icon: 'home', text: 'Dashboard' },
        { href: 'attendance.html', icon: 'calendar_month', text: 'Attendance' },
        { href: 'marks.html', icon: 'grade', text: 'Marks & Results' },
        { href: 'fees.html', icon: 'payments', text: 'Fees' },
      ]},
      { label: 'Resources', items: [
        { href: 'courses.html', icon: 'menu_book', text: 'My Courses' },
        { href: 'announcements.html', icon: 'campaign', text: 'Announcements' },
        { href: 'timetable.html', icon: 'event_note', text: 'Time Table' }
      ]}
    ];

    async function init() {
      try {
        const { user } = await requireAuth(['student']);
        const profile = await safeAsync(() => getUserProfile(user.uid), null, null) || {};
        
        document.getElementById('sidebar').innerHTML = buildSidebar('Student', profile.name || user.email, NAV);
        document.getElementById('logout-btn').addEventListener('click', logoutUser);

        document.getElementById('content').innerHTML = `
          <div class="profile-hero">
            <img class="profile-photo" src="${profile.photoURL || `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(profile.name||'Student')}&backgroundColor=2563eb&textColor=ffffff`}" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=ST&backgroundColor=2563eb&textColor=ffffff'" />
            <div class="profile-name">${profile.name || 'Student'}</div>
            <div class="profile-email">${profile.email || '—'}</div>
          </div>

          <div class="profile-grid">
            <div class="p-card">
              <div class="p-icon"><span class="icon icon-xl">id_card</span></div>
              <div>
                <div class="p-label">Registration No. (PRN)</div>
                <div class="p-value" style="color:var(--primary-light); font-size:22px;">${profile.prn || 'N/A'}</div>
              </div>
            </div>
            
            <div class="p-card">
              <div class="p-icon"><span class="icon icon-xl">badge</span></div>
              <div>
                <div class="p-label">University Seat No. (USN)</div>
                <div class="p-value">${profile.usn || '<span style="color:var(--warning); font-size:14px; font-family:var(--font-main);">Pending from Govt</span>'}</div>
              </div>
            </div>

            <div class="p-card">
              <div class="p-icon"><span class="icon icon-xl">account_balance</span></div>
              <div>
                <div class="p-label">Department</div>
                <div class="p-value">${profile.department || 'N/A'}</div>
              </div>
            </div>

            <div class="p-card">
              <div class="p-icon"><span class="icon icon-xl">school</span></div>
              <div>
                <div class="p-label">Academic Detail</div>
                <div class="p-value">Sem ${profile.semester || '-'} &nbsp;|&nbsp; Sec ${profile.section || '-'}</div>
              </div>
            </div>
          </div>
        `;
      } catch (e) {
        window.location.href = '../index.html';
      }
    }
    
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    init();
  </script>
</body>
</html>
