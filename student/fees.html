<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCore ERP — Fees</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .fee-banner { background: linear-gradient(135deg,rgba(245,158,11,.1),rgba(239,68,68,.06)); border: 1px solid rgba(245,158,11,.25); border-radius: var(--radius-xl); padding: 28px 32px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .fee-amount { font-family: var(--font-display); font-size: 40px; font-weight: 800; }
  </style>
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleSidebar()">&#9776;</button>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header"><h1 class="page-title">Fee Management</h1><div class="page-subtitle">Fee structure, payment status and history</div></div>
      <div id="error-zone"></div>
      <div id="content"><div style="display:flex;align-items:center;justify-content:center;height:40vh;"><div class="spinner" style="display:block;width:36px;height:36px;border-width:3px;"></div></div></div>
    </main>
  </div>
  <div id="toast-container"></div>
  <script type="module">
    import { requireAuth, logoutUser, getUserProfile } from '../js/auth.js';
    import { db } from '../js/firebase-config.js';
    import { collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    import { buildSidebar, safeAsync, formatDate, formatCurrency } from '../js/utils.js';
    const NAV = [
      { label: 'Main', items: [
        { href: 'dashboard.html', icon: 'home', text: 'Dashboard' },
        { href: 'attendance.html', icon: 'calendar_month', text: 'Attendance' },
        { href: 'marks.html', icon: 'grade', text: 'Marks & Results' },
        { href: 'fees.html', icon: 'payments', text: 'Fees', active: true },
      ]},
      { label: 'Resources', items: [
        { href: 'courses.html', icon: 'menu_book', text: 'My Courses' },
        { href: 'announcements.html', icon: 'campaign', text: 'Announcements' }
      ]}
    ];
    async function init() {
      try {
        const { user } = await requireAuth(['student']);
        const profile = await safeAsync(() => getUserProfile(user.uid), null, null) || {};
        document.getElementById('sidebar').innerHTML = buildSidebar('Student', profile.name || user.email, NAV);
        document.getElementById('logout-btn').addEventListener('click', logoutUser);
        const data = await safeAsync(async () => { const q=query(collection(db,'fees'),where('studentId','==',user.uid),limit(1)); const s=await getDocs(q); return s.empty?null:s.docs[0].data(); }, 'error-zone', 'Fee data could not be loaded. Other modules are unaffected.');
        const history = await safeAsync(async () => { const q=query(collection(db,'feePayments'),where('studentId','==',user.uid),orderBy('paidAt','desc')); const s=await getDocs(q); return s.docs.map(d=>({id:d.id,...d.data()})); }, null, null) || [];
        if (!data) { if(!document.querySelector('.module-error')) document.getElementById('content').innerHTML=`<div class="card" style="text-align:center;padding:48px;color:var(--text-muted)">No fee record found.</div>`; return; }
        const paid=data.amountPaid||0, total=data.totalAmount||0, due=total-paid, status=data.status||(due<=0?'Paid':'Pending');
        const breakdown=data.breakdown||{};
        document.getElementById('content').innerHTML = `
          <div class="fee-banner">
            <div><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;">Total Fee</div><div class="fee-amount">${formatCurrency(total)}</div><div style="font-size:14px;color:var(--text-secondary);margin-top:6px;">Academic Year ${data.year||new Date().getFullYear()}</div></div>
            <div style="text-align:right;"><span class="badge ${status==='Paid'?'badge-success':status==='Overdue'?'badge-danger':'badge-warning'}" style="font-size:14px;padding:10px 20px;">${status}</span>${data.dueDate?`<div style="font-size:13px;color:var(--text-muted);margin-top:10px;">Due: ${formatDate(data.dueDate)}</div>`:''}</div>
          </div>
          <div class="stats-grid" style="margin-bottom:24px;">
            <div class="stat-card green"><div class="stat-icon green"><span class="icon icon-filled icon-xl">check_circle</span></div><div class="stat-info"><div class="stat-value">${formatCurrency(paid)}</div><div class="stat-label">Amount Paid</div></div></div>
            <div class="stat-card ${due>0?'yellow':'green'}"><div class="stat-icon ${due>0?'yellow':'green'}"><span class="icon icon-filled icon-xl">${due>0?'schedule':'verified'}</span></div><div class="stat-info"><div class="stat-value">${formatCurrency(Math.max(0,due))}</div><div class="stat-label">Amount Due</div></div></div>
          </div>
          <div class="table-wrapper" style="margin-bottom:24px;">
            <div class="table-header"><div class="table-title">Fee Breakdown</div></div>
            <table class="data-table"><thead><tr><th>Fee Component</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody>${Object.entries(breakdown).length?Object.entries(breakdown).map(([k,v])=>`<tr><td style="font-weight:500;color:var(--text-primary)">${k}</td><td style="font-weight:600">${formatCurrency(v.amount||v)}</td><td><span class="badge ${v.paid?'badge-success':'badge-warning'}">${v.paid?'Paid':'Pending'}</span></td></tr>`).join(''):`<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">No breakdown available</td></tr>`}</tbody></table>
          </div>
          <div class="table-wrapper">
            <div class="table-header"><div class="table-title">Payment History</div></div>
            <table class="data-table"><thead><tr><th>Date</th><th>Amount</th><th>Method</th><th>Reference</th><th>Status</th></tr></thead>
            <tbody>${history.length?history.map(h=>`<tr><td>${formatDate(h.paidAt)}</td><td style="font-weight:600;color:var(--success)">${formatCurrency(h.amount)}</td><td>${h.method||'—'}</td><td style="font-size:12px;color:var(--text-muted)">${h.reference||'—'}</td><td><span class="badge badge-success">Paid</span></td></tr>`).join(''):`<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">No payment history found.</td></tr>`}</tbody></table>
          </div>`;
      } catch(e) { window.location.href = '../index.html'; }
    }
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    init();
  </script>
</body>
</html>
