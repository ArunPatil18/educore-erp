<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduCore ERP — My Courses</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 24px; }
  </style>
</head>
<body>
  <button class="mobile-menu-btn" id="mobile-menu" onclick="toggleSidebar()">&#9776;</button>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">My Courses</h1>
        <div style="font-size:14px;color:var(--text-secondary);margin-top:4px;" id="dept-sem-label">Loading curriculum details...</div>
      </div>
      
      <div id="content">
        <div id="courses-grid" class="courses-grid">
          <div style="display:flex;align-items:center;gap:12px;color:var(--text-muted);grid-column:1/-1;">
            <div class="spinner" style="width:24px;height:24px;border-width:2px;display:block;"></div>
            Fetching your catalog...
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="toast-container"></div>
  <script type="module">
    import { requireAuth, logoutUser, getUserProfile } from '../js/auth.js';
    import { db } from '../js/firebase-config.js';
    import { collection, query, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    import { showToast, buildSidebar, safeAsync } from '../js/utils.js';
    
    const NAV = [
      { label: 'Main', items: [
        { href: 'dashboard.html', icon: 'home', text: 'Dashboard' },
        { href: 'attendance.html', icon: 'calendar_month', text: 'Attendance' },
        { href: 'marks.html', icon: 'grade', text: 'Marks & Results' },
        { href: 'fees.html', icon: 'payments', text: 'Fees' },
      ]},
      { label: 'Resources', items: [
        { href: 'courses.html', icon: 'menu_book', text: 'My Courses', active: true },
        { href: 'announcements.html', icon: 'campaign', text: 'Announcements' },
        { href: 'timetable.html', icon: 'event_note', text: 'Time Table' }
      ]}
    ];

    async function init() {
      try {
        const { user } = await requireAuth(['student']);
        const profile = await safeAsync(() => getUserProfile(user.uid), null, null) || {};
        document.getElementById('sidebar').innerHTML = buildSidebar('Student', profile.name || user.email, NAV);
        document.getElementById('logout-btn').addEventListener('click', logoutUser);
        
        if(!profile.department || !profile.semester) {
           document.getElementById('courses-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);border:1px solid var(--glass-border);border-radius:var(--radius-md);">Your profile is missing Department or Semester information. Please contact an Administrator.</div>`;
           document.getElementById('dept-sem-label').textContent = 'Profile Incomplete';
           return;
        }

        await loadMyCourses(profile.department, profile.semester);
      } catch (e) { window.location.href = '../index.html'; }
    }

    async function loadMyCourses(dept, sem) {
       document.getElementById('dept-sem-label').textContent = `${dept} — Semester ${sem}`;
       
       const list = await safeAsync(async () => {
         // JavaScript filter to avoid requiring a Firebase Custom Composite Index
         const q = query(collection(db, 'master_subjects'));
         const s = await getDocs(q);
         const allSubjects = s.docs.map(d=>d.data());
         return allSubjects.filter(c => 
           (c.department||'').toLowerCase().trim() === (dept||'').toLowerCase().trim() && 
           parseInt(c.semester) === parseInt(sem)
         );
       }, null, null) || [];

       if (!list.length) {
         document.getElementById('courses-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted);border:1px solid var(--glass-border);border-radius:var(--radius-md);">No courses found in the Master Catalog for your semester.</div>`;
         return;
       }

       document.getElementById('courses-grid').innerHTML = list.map(c => `
         <a href="materials.html?code=${encodeURIComponent(c.code)}&title=${encodeURIComponent(c.name)}" class="card" style="display:flex;align-items:flex-start;gap:16px;text-decoration:none;color:inherit;transition:transform 0.2s, border-color 0.2s;" onmouseover="this.style.transform='translateY(-3px)';this.style.borderColor='var(--primary)';" onmouseout="this.style.transform='none';this.style.borderColor='var(--glass-border)';">
           <div style="background:var(--primary);color:#fff;width:48px;height:48px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;">
             ${c.name.charAt(0).toUpperCase()}
           </div>
           <div>
             <div style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--text-primary)">${c.name}</div>
             <div style="font-size:13px;color:var(--text-muted);">Course Code: <strong style="color:var(--text-primary)">${c.code}</strong></div>
           </div>
         </a>
       `).join('');
    }

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    init();
  </script>
</body>
</html>
